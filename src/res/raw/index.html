    const nilaiSaatIni = data[nama];

    if (nilaiSaatIni == nilai) return;

    data[nama] = nilai;

    const lisPemantau = mapPemantau[nama];
    if (lisPemantau) {
        for (const f of lisPemantau) {
            try {
                f(nilaiSaatIni, nilai);
            } catch (error) {
                console.error(error);
            }
        }
    }
}

        }
    }
    const lisPemantau = mapPemantau[nama] = mapPemantau[nama] || [];
    lisPemantau.push(f);
}
