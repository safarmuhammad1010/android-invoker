const mapPemantau = {};


function fAmbil(nama, alternatif) {
    const nilai = data[nama] || alternatif;
    return nilai;
}


function fSimpan(nama, nilai) {
    const nilaiSaatIni = data[nama];

    if (nilaiSaatIni == nilai) return;

    data[nama] = nilai;

    const lisPemantau = mapPemantau[nama];
    if (lisPemantau) {
        for (const f of lisPemantau) {
            try {
                f(nilaiSaatIni, nilai);
            } catch (error) {
                console.error(error);
            }
        }
    }
}


function fPantau(nama, f) {
    const nilai = data[nama];
    if (typeof(nilai) !== 'undefined') {
        try {
            f(nilai, nilai);
        } catch (error) {
            console.error(error);
        }
    }
    const lisPemantau = mapPemantau[nama] = mapPemantau[nama] || [];
    lisPemantau.push(f);
}

function fHitungPenggunaanKapasitasData() {
  let totalBytes = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const value = localStorage.getItem(key);
    // Multiply by 2 because JS strings are UTF-16 (2 bytes per char)
    totalBytes += (key.length + value.length) * 2;
  }
  return {
    bytes: totalBytes,
    kilobytes: (totalBytes / 1024).toFixed(2),
    megabytes: (totalBytes / (1024 * 1024)).toFixed(2)
  };
}

    const s = n + '';
    let x = '';
    const k = 5 - s.length;
    for (let i = 0; i < k; i++) {
        x += '0';
    }
    return x + s;
}

function fFormatNomorHp(nomorHp) {
    let hasil = '';
    for (let i = 1; i <= nomorHp.length; i++) {
        const angka = nomorHp[i-1];
        if (i % 4) {
            hasil += angka;
        } else if (i > 0 && i < (nomorHp.length)) {
            hasil += angka;
            hasil += '-';
        }
    }
    return hasil;
}
