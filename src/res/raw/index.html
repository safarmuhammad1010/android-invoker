    const nilai = data[nama] || alternatif;

function fSimpan(nama, nilai) {
    const nilaiSaatIni = data[nama];

    if (nilaiSaatIni == nilai) return;

    data[nama] = nilai;

    const lisPemantau = mapPemantau[nama];
    if (lisPemantau) {
        for (const f of lisPemantau) {
            try {
                f(nilaiSaatIni, nilai);
            } catch (error) {
                console.error(error);
            }
        }
    }
}


function fPantau(nama, f) {
    const nilai = data[nama];
    if (typeof(nilai) !== 'undefined') {
        try {
            f(nilai, nilai);
        } catch (error) {
            console.error(error);
        }
    }
    const lisPemantau = mapPemantau[nama] = mapPemantau[nama] || [];
    lisPemantau.push(f);
}
